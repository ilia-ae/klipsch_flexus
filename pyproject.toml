[tool.ruff]
target-version = "py312"
line-length = 120
exclude = ["legacy/"]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
]
ignore = [
    "E501",   # line too long (handled by formatter)
]

[tool.ruff.lint.isort]
known-first-party = ["custom_components.klipsch_flexus"]

[tool.pytest.ini_options]
# Without this, pytest-asyncio silently SKIPS every `async def` test, so the
# whole async suite never runs in CI. AUTO mode treats them as asyncio tests.
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
